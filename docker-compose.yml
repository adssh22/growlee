services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: growlee
      POSTGRES_USER: growlee
      POSTGRES_PASSWORD: growlee
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U growlee -d growlee"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./apps/backend
    environment:
      POSTGRES_DB: growlee
      POSTGRES_USER: growlee
      POSTGRES_PASSWORD: growlee
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: 1
      DJANGO_SECRET_KEY: growlee-dev-secret
      APP_BASE_URL: http://192.168.1.27:8000
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Growlee <noreply@growlee.local>}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      SMS_FROM: ${SMS_FROM:-Growlee}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SMS_SENDER: ${BREVO_SMS_SENDER:-Growlee}
      GROWLEE_PAYMENT_LINK_STARTER: ${GROWLEE_PAYMENT_LINK_STARTER:-}
      GROWLEE_PAYMENT_LINK_PRO: ${GROWLEE_PAYMENT_LINK_PRO:-}
      GROWLEE_PAYMENT_LINK_PREMIUM: ${GROWLEE_PAYMENT_LINK_PREMIUM:-}
      APPLE_WALLET_PASS_TYPE_ID: ${APPLE_WALLET_PASS_TYPE_ID:-}
      APPLE_WALLET_TEAM_ID: ${APPLE_WALLET_TEAM_ID:-}
      APPLE_WALLET_CERT_PATH: ${APPLE_WALLET_CERT_PATH:-}
      APPLE_WALLET_KEY_PATH: ${APPLE_WALLET_KEY_PATH:-}
      APPLE_WALLET_WWDR_CERT_PATH: ${APPLE_WALLET_WWDR_CERT_PATH:-}
      GOOGLE_WALLET_ISSUER_ID: ${GOOGLE_WALLET_ISSUER_ID:-}
      GOOGLE_WALLET_SERVICE_ACCOUNT_PATH: ${GOOGLE_WALLET_SERVICE_ACCOUNT_PATH:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
