{% extends 'admin/base.html' %}
{% block title %}Connexion employeur · Growlee{% endblock %}
{% block content %}
<div class="topbar"><div><div class="eyebrow">Sécurité</div><div class="title">Connexion employeur</div><div class="subtitle">Pour quitter le mode employé, reconnectez-vous avec un vrai compte propriétaire ou manager du commerce.</div></div></div>
<div class="card" style="max-width:520px;">
  <form method="post">{% csrf_token %}
    <label>Identifiant employeur</label>
    <input type="text" name="username" autofocus autocomplete="username" placeholder="Identifiant" />
    <label>Mot de passe</label>
    <input type="password" name="password" autocomplete="current-password" placeholder="Mot de passe" />
    <button class="btn" style="width:100%;margin-top:16px;" type="submit">Déverrouiller l’espace employeur</button>
    <a class="btn secondary" style="width:100%;margin-top:10px;" href="/admin/employee/">Retour mode employé</a>
  </form>
</div>
{% endblock %}
