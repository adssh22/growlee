<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ provider }} · {{ merchant.name }}</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="description" content="Préparation du pass wallet Growlee pour {{ merchant.name }}." />
  <link rel="canonical" href="https://growlee.fr{{ request.path }}" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ provider }} · {{ merchant.name }}" />
  <meta property="og:description" content="Préparation du pass wallet Growlee." />
  <meta name="twitter:card" content="summary" />
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,{{ merchant.primary_color|default:'#534AB7' }},#07111f);font-family:Inter,system-ui,sans-serif;color:#fff}.card{max-width:420px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:28px;padding:28px;box-shadow:0 28px 70px rgba(0,0,0,.32);backdrop-filter:blur(16px)}.eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.58);font-weight:800}.title{font-size:28px;font-weight:850;margin:8px 0 10px}.txt{font-size:14px;line-height:1.55;color:rgba(255,255,255,.74)}.pill{display:inline-flex;margin-top:18px;border-radius:999px;background:#fff;color:#111827;padding:10px 14px;font-size:12px;font-weight:800}.code{margin-top:18px;padding:14px;border-radius:16px;background:rgba(0,0,0,.24);font-size:12px;color:rgba(255,255,255,.72);word-break:break-word}
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Préparation wallet</div>
    <div class="title">{{ provider }}</div>
    <div class="txt">La base technique est prête. Dès que les certificats/tokens seront ajoutés, ce bouton générera le vrai pass et l’ajoutera au wallet.</div>
    <div class="pill">{{ wallet_pass.get_status_display }}</div>
    {% if wallet_pass.error_message %}<div class="code">{{ wallet_pass.error_message }}</div>{% endif %}
  </div>
</body>
</html>
