<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} · Growlee</title>
  <meta name="description" content="{{ description }}" />
  <meta name="robots" content="{% if noindex %}noindex,nofollow{% else %}index,follow{% endif %}" />
  <style>
    :root{--purple:#534ab7;--purple-2:#766cf0;--lav:#afa9ec;--green:#1d9e75;--mint:#72e0bc;--ink:#17152b;--muted:#69647f;--line:#eceaf7;--paper:#fbfbff;--white:#fff;--shadow:0 30px 90px rgba(39,32,91,.14)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:var(--paper);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}a{text-decoration:none;color:inherit}.bg{position:fixed;inset:0;z-index:-3;background:radial-gradient(circle at 11% 4%,rgba(175,169,236,.42),transparent 31%),radial-gradient(circle at 88% 12%,rgba(29,158,117,.22),transparent 30%),linear-gradient(180deg,#fff 0%,#f7f6ff 52%,#fff 100%)}.bg:after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(83,74,183,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(83,74,183,.04) 1px,transparent 1px);background-size:52px 52px;mask-image:linear-gradient(180deg,#000 0%,transparent 78%)}.ambient{position:fixed;inset:auto auto 7% -9%;width:42vw;height:42vw;border-radius:999px;background:radial-gradient(circle,rgba(83,74,183,.16),transparent 68%);filter:blur(8px);z-index:-2}.ambient.two{left:auto;right:-12%;top:22%;background:radial-gradient(circle,rgba(29,158,117,.14),transparent 68%)}.wrap{width:min(980px,calc(100% - 40px));margin:0 auto}.nav-wrap{position:sticky;top:0;z-index:20;padding:16px 0;backdrop-filter:blur(18px)}.nav{height:74px;border:1px solid rgba(255,255,255,.9);background:rgba(255,255,255,.74);box-shadow:0 20px 55px rgba(39,32,91,.09);border-radius:28px;padding:0 14px 0 22px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand img{height:52px;display:block}.nav-actions{display:flex;align-items:center;gap:10px}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:13px 18px;font-weight:950;border:1px solid transparent;transition:.2s ease;white-space:nowrap;background:linear-gradient(135deg,var(--purple),var(--purple-2));color:#fff;box-shadow:0 18px 42px rgba(83,74,183,.27)}.btn:hover{transform:translateY(-2px)}.btn.secondary{background:rgba(255,255,255,.82);border-color:var(--line);color:var(--ink);box-shadow:0 12px 30px rgba(39,32,91,.07)}.theme-toggle{border:1px solid rgba(83,74,183,.14);background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.74));color:var(--ink);border-radius:999px;padding:6px 10px 6px 6px;font-weight:950;cursor:pointer;box-shadow:0 16px 40px rgba(39,32,91,.11),inset 0 1px 0 rgba(255,255,255,.85);display:inline-flex;gap:9px;align-items:center;transition:.22s ease;backdrop-filter:blur(16px)}.theme-toggle:hover{transform:translateY(-2px);box-shadow:0 22px 55px rgba(39,32,91,.16)}.toggle-track{position:relative;width:54px;height:30px;border-radius:999px;background:linear-gradient(135deg,#f3f1ff,#fff);box-shadow:inset 0 0 0 1px rgba(83,74,183,.12)}.toggle-knob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:999px;background:linear-gradient(135deg,#fff,#f4f1ff);box-shadow:0 8px 18px rgba(39,32,91,.18);transition:.25s cubic-bezier(.2,.8,.2,1)}.toggle-knob:before{content:"";position:absolute;inset:7px;border-radius:50%;background:var(--purple);box-shadow:7px -4px 0 -4px var(--green)}.theme-label{font-size:12px;letter-spacing:-.02em}.hero{padding:54px 0 34px;text-align:center}.eyebrow{display:inline-flex;gap:9px;align-items:center;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.82);border:1px solid var(--line);box-shadow:0 14px 34px rgba(39,32,91,.07);color:var(--purple);font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.08em;margin-bottom:22px}.eyebrow:before{content:"";width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px rgba(29,158,117,.13)}h1{font-size:clamp(42px,6.3vw,72px);line-height:.94;letter-spacing:-.08em;margin:0 0 16px}.grad{background:linear-gradient(135deg,var(--purple),var(--green));-webkit-background-clip:text;background-clip:text;color:transparent}.lead{font-size:18px;color:var(--muted);line-height:1.65;max-width:760px;margin:0 auto 28px}.card{background:rgba(255,255,255,.84);border:1px solid rgba(255,255,255,.94);border-radius:36px;padding:34px;box-shadow:0 24px 64px rgba(39,32,91,.08);position:relative;overflow:hidden}.card:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.74),transparent);pointer-events:none}.card:after{content:"";position:absolute;right:-18%;bottom:-38%;width:55%;height:55%;border-radius:50%;background:radial-gradient(circle,rgba(83,74,183,.10),transparent 68%);pointer-events:none}.card>*{position:relative}h2{font-size:28px;line-height:1.08;letter-spacing:-.055em;margin:30px 0 10px}p,li{color:#5f5a76;line-height:1.65}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}.mini{padding:18px;border-radius:22px;background:rgba(255,255,255,.78);border:1px solid var(--line);box-shadow:0 14px 36px rgba(39,32,91,.055)}form{background:rgba(255,255,255,.78)!important;border:1px solid var(--line)!important;box-shadow:0 16px 42px rgba(39,32,91,.06)}input,select,textarea{font:inherit;color:var(--ink);background:#fff}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--purple)!important;box-shadow:0 0 0 4px rgba(83,74,183,.10)}footer{padding:34px 0 48px;color:#746f8d;font-size:14px;text-align:center}html[data-theme="dark"]{color-scheme:dark}html[data-theme="dark"] body{color:#f8fafc;background:#0b1020}html[data-theme="dark"] .bg{background:radial-gradient(circle at 11% 4%,rgba(118,108,240,.28),transparent 31%),radial-gradient(circle at 88% 12%,rgba(114,224,188,.13),transparent 30%),linear-gradient(180deg,#0b1020 0%,#111827 52%,#0b1020 100%)}html[data-theme="dark"] .bg:after{background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px)}html[data-theme="dark"] .nav,html[data-theme="dark"] .card,html[data-theme="dark"] .mini,html[data-theme="dark"] .btn.secondary,html[data-theme="dark"] .theme-toggle{background:rgba(15,23,42,.82);border-color:rgba(255,255,255,.10);color:#f8fafc;box-shadow:0 20px 55px rgba(0,0,0,.20)}html[data-theme="dark"] .card:before{background:linear-gradient(180deg,rgba(255,255,255,.05),transparent)}html[data-theme="dark"] p,html[data-theme="dark"] li,html[data-theme="dark"] .lead,html[data-theme="dark"] footer{color:#cbd5e1}html[data-theme="dark"] form{background:rgba(15,23,42,.72)!important;border-color:rgba(255,255,255,.10)!important}html[data-theme="dark"] input,html[data-theme="dark"] select,html[data-theme="dark"] textarea{background:#111827;border-color:rgba(255,255,255,.12)!important;color:#fff}html[data-theme="dark"] .toggle-track{background:linear-gradient(135deg,#17152b,#534ab7)}html[data-theme="dark"] .toggle-knob{left:27px;background:linear-gradient(135deg,#72e0bc,#fff)}html[data-theme="dark"] .toggle-knob:before{background:#17152b;box-shadow:6px -4px 0 -2px #72e0bc}@media(max-width:720px){.wrap{width:min(100% - 28px,980px)}.nav{height:auto;border-radius:22px;padding:10px}.brand img{height:38px}.grid{grid-template-columns:1fr}.card{padding:24px;border-radius:30px}.theme-toggle{padding:5px}.theme-label{display:none}.toggle-track{width:50px;height:28px}.toggle-knob{width:22px;height:22px}html[data-theme="dark"] .toggle-knob{left:25px}.btn{padding:11px 13px;font-size:13px}h1{font-size:46px}}
  </style>
</head>
<body><div class="bg"></div><div class="ambient"></div><div class="ambient two"></div><header class="nav-wrap"><div class="wrap"><div class="nav"><a class="brand" href="/" aria-label="Growlee"><img src="{% static 'brand/growlee-logo-full.png' %}" alt="Growlee"></a><div class="nav-actions"><button id="infoThemeToggle" class="theme-toggle" type="button" aria-label="Changer de thème"><span class="toggle-track"><span class="toggle-knob"></span></span><span class="theme-label">Sombre</span></button><a class="btn secondary" href="/">Accueil</a></div></div></div></header><main class="wrap"><section class="hero"><div class="eyebrow">Growlee</div><h1>{{ title|default:'Growlee' }} <span class="grad">premium.</span></h1><p class="lead">{{ description }}</p></section><article class="card">{% block body %}{% endblock %}</article></main><footer>© Growlee · <a href="mailto:contact@growlee.fr">contact@growlee.fr</a></footer><script>const t=document.getElementById('infoThemeToggle');const saved=localStorage.getItem('growlee-landing-theme')||localStorage.getItem('growlee-admin-theme');const prefers=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;function setTheme(theme){document.documentElement.setAttribute('data-theme',theme);if(t){t.setAttribute('aria-label',theme==='dark'?'Activer le mode clair':'Activer le mode sombre');t.innerHTML='<span class="toggle-track"><span class="toggle-knob"></span></span><span class="theme-label">'+(theme==='dark'?'Clair':'Sombre')+'</span>';}}setTheme(saved||(prefers?'dark':'light'));if(t)t.addEventListener('click',()=>{const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';localStorage.setItem('growlee-landing-theme',next);setTheme(next);});</script></body></html>
