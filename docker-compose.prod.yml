services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - media_data:/srv/media:ro

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-growlee} -d $${POSTGRES_DB:-growlee}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./apps/backend
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      DJANGO_DEBUG: "0"
      APP_BASE_URL: https://growlee.fr
      DJANGO_ALLOWED_HOSTS: growlee.fr,www.growlee.fr
      DJANGO_CSRF_TRUSTED_ORIGINS: https://growlee.fr,https://www.growlee.fr
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - media_data:/app/media

  notification-worker:
    build: ./apps/backend
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      DJANGO_DEBUG: "0"
      APP_BASE_URL: https://growlee.fr
      DJANGO_ALLOWED_HOSTS: growlee.fr,www.growlee.fr
      DJANGO_CSRF_TRUSTED_ORIGINS: https://growlee.fr,https://www.growlee.fr
      NOTIFICATION_WORKER_INTERVAL_SECONDS: ${NOTIFICATION_WORKER_INTERVAL_SECONDS:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c '
        echo "[notification-worker] starting Growlee notification worker";
        while true; do
          echo "[notification-worker] processing pending/failed notification jobs";
          python manage.py process_notification_jobs --limit 100 --include-failed;
          echo "[notification-worker] sleeping $${NOTIFICATION_WORKER_INTERVAL_SECONDS:-60}s";
          sleep "$${NOTIFICATION_WORKER_INTERVAL_SECONDS:-60}";
        done
      '
    volumes:
      - media_data:/app/media

  metrics-worker:
    build: ./apps/backend
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      DJANGO_DEBUG: "0"
      APP_BASE_URL: https://growlee.fr
      DJANGO_ALLOWED_HOSTS: growlee.fr,www.growlee.fr
      DJANGO_CSRF_TRUSTED_ORIGINS: https://growlee.fr,https://www.growlee.fr
      GROWLEE_METRICS_REBUILD_DAYS: ${GROWLEE_METRICS_REBUILD_DAYS:-7}
      METRICS_WORKER_INTERVAL_SECONDS: ${METRICS_WORKER_INTERVAL_SECONDS:-3600}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c '
        echo "[metrics-worker] starting Growlee metrics worker";
        while true; do
          SINCE=$$(date -u -d "$${GROWLEE_METRICS_REBUILD_DAYS:-7} days ago" +%F);
          echo "[metrics-worker] rebuilding daily metrics since $${SINCE}";
          python manage.py rebuild_daily_metrics --since "$${SINCE}";
          echo "[metrics-worker] sleeping $${METRICS_WORKER_INTERVAL_SECONDS:-3600}s";
          sleep "$${METRICS_WORKER_INTERVAL_SECONDS:-3600}";
        done
      '
    volumes:
      - media_data:/app/media

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  media_data:
